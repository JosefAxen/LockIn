name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.1xx'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios --skip-sign-check

      - name: Restore
        run: dotnet restore LockIn/LockIn.csproj

      - name: Build iOS (unsigned)
        run: |
          dotnet publish LockIn/LockIn.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            /p:CodesignKey="" \
            /p:CodesignProvision="" \
            /p:EnableCodeSigning=false \
            /p:ArchiveOnBuild=false

      - name: Package as IPA
        run: |
          APP_PATH=$(find LockIn/bin/Release/net9.0-ios/ios-arm64 -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LockIn.ipa Payload

      - name: Get version
        id: version
        run: echo "tag=$(date +'%Y.%m.%d')-$(echo $GITHUB_SHA | cut -c1-6)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tag }}
          name: LockIn ${{ steps.version.outputs.tag }}
          files: LockIn.ipa
          make_latest: true

      - name: Update source.json version
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          DATE=$(date +'%Y-%m-%d')
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" docs/source.json
          sed -i '' "s/\"date\": \".*\"/\"date\": \"$DATE\"/" docs/source.json

      - name: Commit updated source.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/source.json
          git diff --staged --quiet || git commit -m "chore: update source.json to ${{ steps.version.outputs.tag }} [skip ci]"
          git push
