name: Build & Deploy iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Restore
        run: dotnet restore LockIn/LockIn.csproj

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" \
            /dev/stdin <<< $(security cms -D -i $PP_PATH))
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" \
            /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed profile: $PROFILE_NAME ($UUID)"
          echo "PROV_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Build iOS (signed)
        run: |
          dotnet publish LockIn/LockIn.csproj \
            -f net10.0-ios \
            -c Release \
            -r ios-arm64 \
            /p:CodesignProvision="$PROV_PROFILE_NAME"

      - name: Package as IPA
        run: |
          APP_PATH=$(find LockIn/bin/Release/net10.0-ios/ios-arm64 -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LockIn.ipa Payload

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file LockIn.ipa \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_KEY_ISSUER_ID" \
            --verbose

      - name: Get version
        id: version
        run: echo "tag=$(date +'%Y.%m.%d')-$(echo $GITHUB_SHA | cut -c1-6)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.tag }}
          name: LockIn ${{ steps.version.outputs.tag }}
          files: LockIn.ipa
          make_latest: true

      - name: Update source.json version
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          DATE=$(date +'%Y-%m-%d')
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" docs/source.json
          sed -i '' "s/\"date\": \".*\"/\"date\": \"$DATE\"/" docs/source.json

      - name: Commit updated source.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/source.json
          git diff --staged --quiet || \
            git commit -m "chore: update source.json to ${{ steps.version.outputs.tag }} [skip ci]"
          git push
