workflows:
  lockin-ios-release:
    name: LockIn — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: 26.5
      groups:
        - LockIn

    scripts:
      - name: Bygg och distribuera
        script: |
          set -e

          # ── .NET ───────────────────────────────────────────────
          curl -fsSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 10.0
          export PATH="$HOME/.dotnet:$PATH"
          dotnet workload install maui-ios

          # ── Keychain ───────────────────────────────────────────
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH

          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k $KEYCHAIN_PATH -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # ── Provisioning-profil ────────────────────────────────
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

          # ── Bygg ───────────────────────────────────────────────
          dotnet publish LockIn/LockIn.csproj \
            -f net10.0-ios \
            -c Release \
            -r ios-arm64 \
            /p:ArchiveOnBuild=true \
            /p:CodesignProvision="LockIn Distribution" \
            /p:CodesignKey="Apple Distribution"

          # ── TestFlight-upload ──────────────────────────────────
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

          IPA=$(find . -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

    artifacts:
      - '**/*.ipa'
